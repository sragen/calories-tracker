spring:
  application:
    name: calories-tracker
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/app_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  name: "Calories Tracker"
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-very-long-secret-key-at-least-32-characters-long}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:calories-tracker}
    public-url: ${MINIO_PUBLIC_URL:http://localhost:9000}
  gemini:
    api-key: ${GEMINI_API_KEY:your-gemini-api-key-here}
  midtrans:
    server-key: ${MIDTRANS_SERVER_KEY:SB-Mid-server-your-key-here}
    is-production: ${MIDTRANS_PRODUCTION:false}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
