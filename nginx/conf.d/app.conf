server {
    listen 80;
    server_name api.adikur.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.adikur.com;

    ssl_certificate     /etc/letsencrypt/live/api.adikur.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.adikur.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    location / {
        proxy_pass         http://backend:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

server {
    listen 80;
    server_name admin.adikur.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name admin.adikur.com;

    ssl_certificate     /etc/letsencrypt/live/admin.adikur.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.adikur.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://admin:3000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
